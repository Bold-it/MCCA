databases:
  # 1. PostgreSQL Database
  - name: mmca-postgres
    plan: free
    postgresMajorVersion: 16

services:

  # 2. Node.js Backend Service
  - type: web
    name: mmca-backend-prod
    env: node
    plan: free
    rootDir: backend
    buildCommand: "npm install --include=dev && npx prisma generate && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: mmca-postgres
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: mmca-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # 3. FastAPI ML Service
  - type: web
    name: mmca-ml-service-prod
    env: python
    plan: free
    rootDir: ml-service
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
