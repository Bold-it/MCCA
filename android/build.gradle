buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "26.3.11579264"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven { 
            url = uri(project(":react-native-async-storage_async-storage").file("local_repo")) 
        }
    }
}

subprojects {
  tasks.configureEach { task ->
    if (task.name.contains('AarMetadata')) {
      task.enabled = false
    }
  }
}

// Returns the Windows 8.3 short path to avoid spaces-in-path issues with CMake.
def getShortPath(String path) {
    if (System.getProperty("os.name").toLowerCase().contains("windows")) {
        try {
            def escaped = path.replace('/', '\\')
            def cmd = ["powershell.exe", "-Command",
                "(New-Object -ComObject Scripting.FileSystemObject).GetFolder('${escaped}').ShortPath"]
            def process = cmd.execute()
            process.waitFor()
            if (process.exitValue() == 0) {
                return process.text.trim().replace('\\', '/')
            }
        } catch (Exception e) { /* fallback below */ }
    }
    return path
}

// Force-include the std::format shim for NDK r26 across ALL subprojects.
// The shim is a no-op when std::format is natively available (__cpp_lib_format defined).
def applyStdFormatShim = { proj ->
    proj.android {
        defaultConfig {
            externalNativeBuild {
                cmake {
                    def shimPath = getShortPath("${rootProject.projectDir.absolutePath}/android/patches/stdformat.h")
                    cppFlags "-std=c++20", "-include \"${shimPath}\""
                    arguments "-DCMAKE_CXX_STANDARD=20", "-DCMAKE_CXX_STANDARD_REQUIRED=ON"
                }
            }
        }
    }
}

subprojects { proj ->
    pluginManager.withPlugin("com.android.library") {
        if (proj.state.executed) {
            applyStdFormatShim(proj)
        } else {
            proj.afterEvaluate {
                applyStdFormatShim(proj)
            }
        }
    }
    pluginManager.withPlugin("com.android.application") {
        if (proj.state.executed) {
            applyStdFormatShim(proj)
        } else {
            proj.afterEvaluate {
                applyStdFormatShim(proj)
            }
        }
    }
}
